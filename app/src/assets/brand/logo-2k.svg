<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="beam" x1="16" y1="26" x2="48" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dfe6e9" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Fulcrum triangle -->
  <polygon points="32,44 27,52 37,52" fill="#fff" opacity="0.95"/>
  <!-- Stand line -->
  <line x1="32" y1="20" x2="32" y2="44" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <!-- Balance beam -->
  <line x1="14" y1="24" x2="50" y2="24" stroke="url(#beam)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left pan: letter tile "a" -->
  <rect x="10" y="28" width="14" height="14" rx="3" fill="#fff" opacity="0.95"/>
  <text x="17" y="39" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#6c5ce7">a</text>
  <!-- Right pan: marble -->
  <circle cx="47" cy="35" r="7" fill="#fff" opacity="0.95"/>
  <circle cx="47" cy="35" r="5" fill="#00cec9" opacity="0.8"/>
  <circle cx="45" cy="33" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Hanging strings -->
  <line x1="17" y1="24" x2="17" y2="28" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="47" y1="24" x2="47" y2="28" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
</svg>
